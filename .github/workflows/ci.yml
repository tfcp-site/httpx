name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: self-hosted
    timeout-minutes: 10
    concurrency:
      group: golangci-lint
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - run: golangci-lint run ./...

  test:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: just test

  release:
    needs: [lint, test]
    if: github.event_name == 'push'
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: go

  carl-tests:
    needs: [lint, test]
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v4
      - uses: deyna256/carl@v3
        with:
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          config-path: .github/carl/tests/carl.yml

  carl-impl:
    needs: [lint, test]
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v4
      - uses: deyna256/carl@v3
        with:
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          config-path: .github/carl/impl/carl.yml

  carl-issue:
    needs: [lint, test]
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v4
      - uses: deyna256/carl@v3
        with:
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          config-path: .github/carl/issue/carl.yml
